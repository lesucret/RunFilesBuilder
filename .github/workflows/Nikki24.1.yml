name: Build Nikki Run Files

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt 目标版本 (例如: 23.05, 24.10)'
        required: true
        default: '24.10'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予创建 Release 的写入权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag from nikki
        id: fetch_tag
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/nikkinikki-org/OpenWrt-nikki/releases/latest | jq -r '.tag_name')
          if [ -z "$latest_tag" ] || [ "$latest_tag" == "null" ]; then
            echo "错误: 无法获取最新版本号！"
            exit 1
          fi
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
          echo "获取到最新版本: $latest_tag"

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download and extract latest nikki files
        env:
          OWRT_VER: ${{ github.event.inputs.openwrt_version }}
        run: |
          # 封装下载与解压函数，提升代码复用性
          download_and_extract() {
            local arch=$1
            local target_file="nikki_${arch}-openwrt-${OWRT_VER}.tar.gz"
            
            echo "正在搜索: $target_file"
            # 使用 jq 精准匹配文件名获取直链
            local download_url=$(curl -s https://api.github.com/repos/nikkinikki-org/OpenWrt-nikki/releases/latest | jq -r ".assets[] | select(.name == \"$target_file\") | .browser_download_url")
            
            if [ -z "$download_url" ]; then
              echo "错误: 找不到对应架构和版本的下载链接 ($target_file)"
              exit 1
            fi
            
            echo "开始下载: $download_url"
            curl -LO "$download_url"
            
            # 创建目录并解压，剥离第一层外壳防止路径嵌套
            mkdir -p "nikki_${arch}"
            tar -xvzf "$target_file" -C "nikki_${arch}" --strip-components=1
          }

          # 执行下载与解压
          download_and_extract "aarch64_cortex-a53"
          download_and_extract "x86_64"

      - name: Clean up filenames and create install scripts
        run: |
          process_dir() {
            local dir=$1
            pushd "$dir" >/dev/null || exit 1
            
            # 批量剔除文件名中的波浪号 ~
            for file in *~*.ipk; do
              [ -e "$file" ] || continue
              new_file="$(echo "$file" | tr -d '~')"
              if [ ! -e "$new_file" ]; then
                mv "$file" "$new_file"
                echo "已重命名: $file -> $new_file"
              fi
            done
            
            # 动态生成一键安装脚本
            cat << 'EOF' > install.sh
            #!/bin/sh
            echo "正在更新软件源..."
            opkg update
            if [ $? -ne 0 ]; then
              echo "警告: 软件源更新失败，将尝试强制安装..."
            fi
            echo "开始安装 Nikki 插件包..."
            opkg install *.ipk
            EOF
            chmod +x install.sh
            
            popd >/dev/null
          }

          process_dir "nikki_aarch64_cortex-a53"
          process_dir "nikki_x86_64"

      - name: Create self-extracting packages
        run: |
          cd makeself
          # 生成自解压文件
          ./makeself.sh ../nikki_x86_64/ nikki_${{ env.LATEST_TAG }}_x86_64.run "Nikki for x86_64" ./install.sh
          ./makeself.sh ../nikki_aarch64_cortex-a53/ nikki_${{ env.LATEST_TAG }}_aarch64_cortex-a53.run "Nikki for aarch64_cortex-a53" ./install.sh
          
          # 将生成的 .run 文件移回工作区根目录
          mv *.run ../

      - name: Generate Release Notes
        run: |
          touch info.md
          cat << EOF > info.md
          ![Github](https://img.shields.io/badge/nikki.run-123456?logo=github&logoColor=fff&labelColor=yellow&style=for-the-badge)
          ![GitHub Downloads](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.LATEST_TAG }}/total?style=for-the-badge&labelColor=black&color=%2325c2a0)

          ### 📦 Nikki 离线安装包生成成功
          - **源版本 Tag**: \`${{ env.LATEST_TAG }}\`
          - **适配 OpenWrt**: \`${{ github.event.inputs.openwrt_version }}\`
          - **包含架构**: \`x86_64\`, \`aarch64_cortex-a53\`
          
          > 此包由 GitHub Actions 自动打包构建。
          EOF

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LATEST_TAG }}
          target_commitish: ${{ github.sha }}
          body_path: info.md
          files: nikki_*.run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
